<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELLWETHER BATTLERS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Silkscreen:wght@400;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f2e9d8;
    --ink:#2b2620;
    --brick:#c4452e;
    --navy:#27425f;
    --brass:#c9a227;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--ink);overflow:hidden;font-family:'Barlow Condensed',sans-serif;color:var(--paper);}
  #wrap{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(140% 100% at 50% 0%, #3a332b 0%, #2b2620 60%),
      var(--ink);
  }
  #stage{
    position:relative;width:min(100vw, 177.78vh);height:min(56.25vw,100vh);
    background:var(--paper);
    border:6px solid var(--ink);
    box-shadow:0 0 0 2px var(--paper), 0 24px 80px rgba(0,0,0,.55);
    overflow:hidden;
  }
  canvas{
    display:block;width:100%;height:100%;
    image-rendering:pixelated;image-rendering:crisp-edges;
  }
  #boot{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;background:var(--paper);color:var(--ink);z-index:10;
    font-family:'Silkscreen',monospace;font-size:13px;letter-spacing:.1em;
    transition:opacity .25s ease;
  }
  #boot.done{opacity:0;pointer-events:none;}
  #boot .bar{width:220px;height:10px;border:2px solid var(--ink);}
  #boot .bar i{display:block;height:100%;width:0;background:var(--brick);transition:width .15s;}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="boot"><div>BELLWETHER BATTLERS</div><div class="bar"><i id="bootbar"></i></div><div id="bootmsg">LOADING THE OFFICE…</div></div>
  </div>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
